name: Sync Suite Registry

on:
  push:
    branches: [master]
    paths:
      - 'cypress/e2e/**'
  workflow_dispatch:
    inputs:
      sync_job_id:
        description: 'sync_jobs.id (UUID) from QA Dashboard — used to update sync status in Supabase'
        required: false
        type: string
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scan and sync cypress/e2e structure to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SYNC_JOB_ID: ${{ inputs.sync_job_id }}
        run: node scripts/sync-suites.mjs
